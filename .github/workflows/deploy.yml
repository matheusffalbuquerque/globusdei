name: Deploy em Produção

on:
  push:
    branches:
      - main

# Cancela deploys anteriores se um novo for iniciado
concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/globusdei

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Build e push das imagens Docker
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build imagens Docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: web-platform
            dockerfile: apps/web-platform/Dockerfile
          - name: main-service
            dockerfile: apps/main-service/Dockerfile
          - name: finance-service
            dockerfile: apps/finance-service/Dockerfile
          - name: notification-service
            dockerfile: apps/notification-service/Dockerfile
          - name: data-service
            dockerfile: apps/data-service/Dockerfile
          - name: report-service
            dockerfile: apps/report-service/Dockerfile

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build e push — ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Deploy no servidor via SSH
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy no servidor
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Configurar chave SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Adicionar servidor aos hosts conhecidos
        run: |
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Clonar ou atualizar repositório no servidor
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            if [ -d ~/globusdei/.git ]; then
              echo '→ Repositório já existe, atualizando...'
              cd ~/globusdei
              git fetch origin
              git reset --hard origin/main
            else
              echo '→ Clonando repositório pela primeira vez...'
              git clone https://github.com/matheusffalbuquerque/globusdei.git ~/globusdei
            fi
          "

      - name: Criar .env no servidor
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'SSHSCRIPT'
          cat > ~/globusdei/.env << ENVEOF
          POSTGRES_USER=globusdei
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=globusdei_db
          DATABASE_URL=postgresql://globusdei:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/globusdei_db?schema=app
          MONGO_USER=root
          MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}
          MONGODB_URI=mongodb://root:${{ secrets.MONGO_PASSWORD }}@mongodb:27017/globusdei?authSource=admin
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          REDIS_URL=redis://:${{ secrets.REDIS_PASSWORD }}@redis:6379
          RABBITMQ_USER=guest
          RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
          RABBITMQ_URL=amqp://guest:${{ secrets.RABBITMQ_PASSWORD }}@rabbitmq:5672
          KEYCLOAK_ADMIN=admin
          KEYCLOAK_ADMIN_PASSWORD=${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
          KEYCLOAK_HOSTNAME=${{ secrets.KEYCLOAK_HOSTNAME }}
          KEYCLOAK_REALM=globusdei
          KEYCLOAK_CLIENT_ID=globusdei-app
          KEYCLOAK_CLIENT_SECRET=${{ secrets.KEYCLOAK_CLIENT_SECRET }}
          KEYCLOAK_URL=http://keycloak:8080
          KEYCLOAK_ISSUER=http://keycloak:8080/realms/globusdei
          KEYCLOAK_JWKS_URI=http://keycloak:8080/realms/globusdei/protocol/openid-connect/certs
          KEYCLOAK_ADMIN_CLIENT_ID=admin-cli
          KEYCLOAK_ADMIN_USERNAME=admin
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
          INTERNAL_SERVICE_TOKEN=${{ secrets.INTERNAL_SERVICE_TOKEN }}
          CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
          NEXT_PUBLIC_MAIN_SERVICE_URL=${{ secrets.NEXT_PUBLIC_MAIN_SERVICE_URL }}
          NEXT_PUBLIC_FINANCE_SERVICE_URL=${{ secrets.NEXT_PUBLIC_FINANCE_SERVICE_URL }}
          NEXT_PUBLIC_NOTIFICATION_SERVICE_URL=${{ secrets.NEXT_PUBLIC_NOTIFICATION_SERVICE_URL }}
          ENVEOF
          echo '→ .env gerado com sucesso'
          SSHSCRIPT

      - name: Pull das imagens e restart dos containers
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd ~/globusdei

            # Login no GitHub Container Registry no servidor
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull de todas as imagens e restart
            docker compose pull
            docker compose up -d --remove-orphans

            # Aguarda 30s e mostra status
            sleep 30
            docker compose ps
          "

      - name: Verificar saúde dos containers
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd ~/globusdei
            UNHEALTHY=\$(docker compose ps --format json | python3 -c \"
          import json, sys
          containers = [json.loads(l) for l in sys.stdin if l.strip()]
          bad = [c['Name'] for c in containers if c.get('Health') not in ('healthy', '')]
          print('\n'.join(bad))
          \")
            if [ -n \"\$UNHEALTHY\" ]; then
              echo 'Containers com problema:'
              echo \"\$UNHEALTHY\"
              exit 1
            fi
            echo 'Todos os containers estão saudáveis!'
          "
