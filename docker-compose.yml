# ─────────────────────────────────────────────────────────────────────────────
# Globus Dei — Docker Compose de Produção
# Infraestrutura: postgres → mongodb → redis → rabbitmq
# Auth:           keycloak (aguarda postgres) → keycloak-config
# Backend:        main-service, finance-service, notification-service (aguardam postgres + keycloak)
# Analytics:      data-service, report-service (aguardam mongodb)
# Frontend:       web-platform (aguarda todos os backends)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Infraestrutura ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: globusdei-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-globusdei}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-globusdei_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - globusdei-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-globusdei} -d ${POSTGRES_DB:-globusdei_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6
    container_name: globusdei-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    networks:
      - globusdei-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: globusdei-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - globusdei-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: globusdei-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - globusdei-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Keycloak ────────────────────────────────────────────────────────────────

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: globusdei-keycloak
    restart: unless-stopped
    command: start --import-realm
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json:ro
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-globusdei_db}
      KC_DB_USERNAME: ${POSTGRES_USER:-globusdei}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME}
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8085:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - globusdei-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 120s

  keycloak-config:
    image: curlimages/curl:latest
    container_name: globusdei-keycloak-config
    restart: "no"
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-globusdei}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    volumes:
      - ./keycloak/configure-google-idp.sh:/configure-google-idp.sh:ro
    entrypoint: ["/bin/sh", "/configure-google-idp.sh"]
    networks:
      - globusdei-network

  # ── Serviços NestJS ─────────────────────────────────────────────────────────

  main-service:
    build:
      context: .
      dockerfile: apps/main-service/Dockerfile
    container_name: globusdei-main-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_JWKS_URI}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      CORS_ORIGINS: ${CORS_ORIGINS}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - globusdei-network

  finance-service:
    build:
      context: .
      dockerfile: apps/finance-service/Dockerfile
    container_name: globusdei-finance-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      HOST: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_JWKS_URI}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      CORS_ORIGINS: ${CORS_ORIGINS}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - globusdei-network

  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    container_name: globusdei-notification-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3004
      HOST: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_JWKS_URI}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      CORS_ORIGINS: ${CORS_ORIGINS}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    ports:
      - "3004:3004"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - globusdei-network

  # ── Serviços Express/MongoDB ─────────────────────────────────────────────────

  data-service:
    build:
      context: .
      dockerfile: apps/data-service/Dockerfile
    container_name: globusdei-data-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3005
      HOST: 0.0.0.0
      MONGODB_URI: ${MONGODB_URI}
    ports:
      - "3005:3005"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - globusdei-network

  report-service:
    build:
      context: .
      dockerfile: apps/report-service/Dockerfile
    container_name: globusdei-report-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3006
      HOST: 0.0.0.0
      MONGODB_URI: ${MONGODB_URI}
    ports:
      - "3006:3006"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - globusdei-network

  # ── Frontend Next.js ────────────────────────────────────────────────────────

  web-platform:
    build:
      context: .
      dockerfile: apps/web-platform/Dockerfile
    container_name: globusdei-web-platform
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      KEYCLOAK_URL: ${KEYCLOAK_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID}
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      NEXT_PUBLIC_MAIN_SERVICE_URL: ${NEXT_PUBLIC_MAIN_SERVICE_URL:-http://main-service:3001/api}
      NEXT_PUBLIC_FINANCE_SERVICE_URL: ${NEXT_PUBLIC_FINANCE_SERVICE_URL:-http://finance-service:3002/api}
      NEXT_PUBLIC_NOTIFICATION_SERVICE_URL: ${NEXT_PUBLIC_NOTIFICATION_SERVICE_URL:-http://notification-service:3004/api}
    ports:
      - "3000:3000"
    depends_on:
      - main-service
      - finance-service
      - notification-service
    networks:
      - globusdei-network

# ─── Volumes ─────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  rabbitmq_data:

# ─── Network ─────────────────────────────────────────────────────────────────

networks:
  globusdei-network:
    driver: bridge
